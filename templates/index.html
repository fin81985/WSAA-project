<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Manager</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container my-4">
    <h1 class="mb-4">📚 Book Manager</h1>

    <!-- Add / Edit form -->
    <div class="card mb-4">
        <div class="card-header" id="formTitle">Add New Book</div>
        <div class="card-body">
            <form id="bookForm">
                <input type="hidden" id="bookId">
                <div class="row g-2">
                    <div class="col-md-4">
                        <input type="text" class="form-control" id="title" placeholder="Title" required>
                    </div>
                    <div class="col-md-3">
                        <input type="text" class="form-control" id="author" placeholder="Author" required>
                    </div>
                    <div class="col-md-2">
                        <input type="number" class="form-control" id="year" placeholder="Year" required>
                    </div>
                    <div class="col-md-2">
                        <input type="text" class="form-control" id="isbn" placeholder="ISBN" required>
                    </div>
                    <div class="col-md-1 d-flex gap-1">
                        <button type="submit" class="btn btn-primary">Save</button>
                        <button type="button" class="btn btn-secondary d-none" id="cancelBtn">Cancel</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- Alert area -->
    <div id="alertArea"></div>

    <!-- Books table -->
    <table class="table table-striped align-middle">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Author</th>
                <th>Year</th>
                <th>ISBN</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="bookTableBody"></tbody>
    </table>
</div>

<script src="/static/script.js"></script>
</body>
</html>

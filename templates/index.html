<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>

    <link rel="stylesheet" href="/static/style.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="container">

    <h1>💰 Expense Tracker</h1>

    <div class="summary">
        <h2>Total Spent: €<span id="total">0</span></h2>
    </div>

    <div class="form">
        <div class="input-group">
            <label for="amount">Amount</label>
            <input type="number" id="amount" placeholder="e.g. 15.50">
        </div>

        <div class="input-group">
            <label for="category">Category</label>
            <select id="category">
                <option value="Food">Food</option>
                <option value="Transport">Transport</option>
                <option value="Bills">Bills</option>
                <option value="Shopping">Shopping</option>
                <option value="Entertainment">Entertainment</option>
                <option value="Other">Other</option>
            </select>
        </div>

        <div class="input-group">
            <label for="description">Description</label>
            <input type="text" id="description" placeholder="What did you buy?">
        </div>

        <div class="input-group">
            <label for="date">Date</label>
            <input type="date" id="date">
        </div>

        <button id="submitBtn" onclick="addExpense()">Add Expense</button>
    </div>

    <hr>

    <div id="expenseList">
        <h3>Recent Transactions</h3>
        </div>

    <div class="chart-container">
        <canvas id="expenseChart"></canvas>
    </div>

</div>

<script src="/static/script.js"></script>

</body>
</html>
